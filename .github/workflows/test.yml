name: Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Unit tests
        run: npm run test -- --coverage

      - name: Integration tests
        run: npm run test:integration -- --coverage

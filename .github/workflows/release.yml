name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package.json version $PKG" >&2
            exit 1
          fi

  test:
    needs: [verify-version]
    uses: ./.github/workflows/test.yml

  create-release:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --draft \
            $PRERELEASE_FLAG

  build:
    needs: [create-release]
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_flag: --mac
            artifact_glob: 'dist/*.dmg'
          - os: windows-latest
            build_flag: --win
            artifact_glob: 'dist/*.exe'
          - os: ubuntu-latest
            build_flag: --linux
            artifact_glob: 'dist/*.AppImage'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - run: npm run build:icons

      - run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.build_flag }}

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.artifact_glob }} --repo ${{ github.repository }}

  publish-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}

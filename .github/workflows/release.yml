name: Release

on:
  release:
    types: [created]

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_flag: --mac
            artifact_glob: 'dist/*.dmg'
          - os: windows-latest
            build_flag: --win
            artifact_glob: 'dist/*.exe'
          - os: ubuntu-latest
            build_flag: --linux
            artifact_glob: 'dist/*.AppImage'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.build_flag }}

      - name: Upload artifact to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} ${{ matrix.artifact_glob }}

  publish:
    needs: [build]
    if: ${{ github.event.release.draft == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit ${{ github.event.release.tag_name }} --draft=false --repo ${{ github.repository }}
